<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unobtainium Keys — Coming Soon</title>
<meta name="description" content="A new line of handcrafted CW Morse keys is coming. Unobtainium Keys." />

<meta property="og:title" content="Unobtainium Keys — Coming Soon" />
<meta property="og:description" content="A new line of handcrafted CW Morse keys is coming." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #ffffff;
    --muted: #8a8a8a;
    --line: rgba(255, 255, 255, 0.55);
    --bg: #000000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Jost', 'Century Gothic', system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100svh;
    display: flex;
    padding: 6vh 24px;
    overflow-x: hidden;
  }

  /* margin:auto centers the block but, unlike justify-content:center,
     never pushes the top out of reach when content is taller than the viewport */
  .wrap {
    margin: auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(28px, 5vh, 56px);
  }

  /* ---------- Element tile (the logo) ---------- */
  .tile {
    position: relative;
    width: clamp(220px, 64vw, 300px);
    aspect-ratio: 1 / 1;
    border: 2px solid var(--line);
    border-radius: 28px;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
  }

  .tile .cw {
    font-size: clamp(20px, 6vw, 26px);
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .tile .symbol {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(96px, 30vw, 140px);
    font-weight: 200;
    line-height: 0.8;
    letter-spacing: -0.02em;
  }

  .tile .name {
    text-align: center;
    font-size: clamp(18px, 5.4vw, 25px);
    font-weight: 300;
    letter-spacing: 0.12em;
  }

  .tile .rule {
    height: 1.5px;
    background: var(--line);
    margin: 12px 4px 14px;
  }

  .tile .tag {
    text-align: center;
    font-size: clamp(13px, 3.6vw, 16px);
    font-weight: 300;
    letter-spacing: 0.28em;
    padding-bottom: 4px;
  }

  /* ---------- Copy ---------- */
  .copy {
    text-align: center;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
    color: var(--muted);
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 7vw, 46px);
    font-weight: 200;
    line-height: 1.12;
    letter-spacing: 0.01em;
  }

  h1 em {
    font-style: normal;
    font-weight: 400;
  }

  .sub {
    font-size: clamp(15px, 4vw, 18px);
    font-weight: 300;
    line-height: 1.6;
    color: #b9b9b9;
    max-width: 460px;
  }

  /* ---------- Morse ticker ---------- */
  .morse {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 14px;
    margin-top: 4px;
  }
  .morse span {
    display: block;
    height: 4px;
    border-radius: 2px;
    background: var(--ink);
    opacity: 0.18;
    animation: blink 3.6s infinite steps(1, end);
  }
  .dot  { width: 4px; }
  .dash { width: 18px; }
  .gap  { width: 8px; opacity: 0 !important; animation: none !important; }

  @keyframes blink {
    0%, 6%   { opacity: 1; }
    7%, 100% { opacity: 0.18; }
  }

  /* ---------- Notify form ---------- */
  form {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    width: min(420px, 88vw);
    flex-wrap: wrap;
    justify-content: center;
  }

  input[type="email"] {
    flex: 1 1 200px;
    min-width: 0;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 999px;
    color: var(--ink);
    font-family: inherit;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.02em;
    padding: 13px 20px;
    transition: border-color 0.25s ease;
  }
  input[type="email"]::placeholder { color: #6f6f6f; }
  input[type="email"]:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.85);
  }

  button {
    background: var(--ink);
    color: #000;
    border: 1px solid var(--ink);
    border-radius: 999px;
    font-family: inherit;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 13px 26px;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s ease;
  }
  button:hover { opacity: 0.82; }
  button:active { transform: scale(0.97); }

  .note {
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--muted);
    min-height: 18px;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: #6f6f6f;
    margin-top: 8px;
  }
  footer a { color: inherit; text-decoration: none; }
  footer a:hover { color: var(--ink); }
  footer .sep { margin: 0 12px; color: #4a4a4a; }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 380px) {
    .tile { border-radius: 22px; }
    footer { letter-spacing: 0.14em; }
  }
</style>
</head>
<body>
 <main class="wrap">

  <!-- Element tile -->
  <div class="tile" aria-label="Unobtainium element tile">
    <div class="cw">CW</div>
    <div class="symbol">Un</div>
    <div class="name">unobtainium</div>
    <div class="rule"></div>
    <div class="tag">[ keys ]</div>
  </div>

  <!-- Copy -->
  <div class="copy">
    <p class="eyebrow">A new line of CW keys</p>
    <h1>Some keys are<br /><em>rarer</em> than others.</h1>
    <p class="sub">
      Precision-built Morse keys, machined for the operator who feels every dit and dah.
      The first release lands soon.
    </p>

    <!-- Morse ticker spelling "73" in code: --... ...-- -->
    <div class="morse" aria-hidden="true">
      <span class="dash" style="animation-delay:.0s"></span>
      <span class="dash" style="animation-delay:.12s"></span>
      <span class="dot"  style="animation-delay:.24s"></span>
      <span class="dot"  style="animation-delay:.36s"></span>
      <span class="dot"  style="animation-delay:.48s"></span>
      <span class="gap"></span>
      <span class="dot"  style="animation-delay:.7s"></span>
      <span class="dot"  style="animation-delay:.82s"></span>
      <span class="dot"  style="animation-delay:.94s"></span>
      <span class="dash" style="animation-delay:1.06s"></span>
      <span class="dash" style="animation-delay:1.18s"></span>
    </div>

    <form id="notify" novalidate>
      <input type="email" name="EMAIL" id="mce-EMAIL" placeholder="your@email.com" aria-label="Email address" autocomplete="email" required />
      <button type="submit">Notify me</button>
      <!-- Mailchimp anti-bot honeypot: must remain empty -->
      <div aria-hidden="true" style="position:absolute; left:-5000px;">
        <input type="text" name="b_293c281b5a73bfa85b93b2f16_3b19d67185" tabindex="-1" value="" autocomplete="off" />
      </div>
    </form>
    <p class="note" id="note">Be first to know. No spam — just the launch.</p>
  </div>

  <footer>
    <a href="https://unobtainiumkeys.com">unobtainiumkeys.com</a>
    <span class="sep" aria-hidden="true">&middot;</span>
    <a href="/who-we-are.html">Who we are</a>
    <span class="sep" aria-hidden="true">&middot;</span>
    <a href="/warranty.html">Warranty</a>
  </footer>

 </main>

  <script>
    (function () {
      // Mailchimp audience: unobtainiumkeys (us3)
      var MC_URL = 'https://unobtainiumkeys.us3.list-manage.com/subscribe/post-json' +
                   '?u=293c281b5a73bfa85b93b2f16&id=3b19d67185&f_id=001003e2f0';

      var form  = document.getElementById('notify');
      var note  = document.getElementById('note');
      var btn   = form.querySelector('button');
      var input = form.querySelector('input[type=email]');
      var hp    = form.querySelector('input[name^="b_"]');
      var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function say(msg, color) { note.textContent = msg; note.style.color = color || '#8a8a8a'; }
      function strip(html) { var d = document.createElement('div'); d.innerHTML = html; return (d.textContent || '').trim(); }

      // Mailchimp only accepts JSONP cross-origin, so submit via a callback <script> tag.
      function jsonp(url, cb) {
        var name = 'mc_cb_' + Date.now();
        var s = document.createElement('script');
        window[name] = function (data) { delete window[name]; s.remove(); cb(data); };
        s.onerror = function () { delete window[name]; s.remove(); cb(null); };
        s.src = url + '&c=' + name;
        document.body.appendChild(s);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = input.value.trim();
        if (!emailRe.test(email)) {
          say('Hmm — that email doesn’t look right.', '#c98');
          input.focus();
          return;
        }

        var prev = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Sending…';
        say('Sending…');

        var url = MC_URL +
                  '&EMAIL=' + encodeURIComponent(email) +
                  '&' + encodeURIComponent(hp.name) + '=';

        jsonp(url, function (data) {
          if (data && data.result === 'success') {
            say('You’re on the list. 73 — watch your inbox.', '#fff');
            form.reset();
            btn.textContent = 'Done';
            return;
          }
          btn.disabled = false;
          btn.textContent = prev;
          if (data && data.msg) {
            var m = strip(data.msg).replace(/^\d+\s*-\s*/, '');
            if (/already subscribed/i.test(m)) {
              say('You’re already on the list. 73!', '#fff');
              btn.textContent = 'Done';
              btn.disabled = true;
            } else {
              say(m, '#c98');
            }
          } else {
            say('Something went wrong — try again in a moment.', '#c98');
          }
        });
      });
    })();
  </script>
</body>
</html>
